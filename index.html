<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#020610;font-family:'Poppins',sans-serif;height:100%}
  body{overflow-x:hidden}
  .wrap{background:#020610;min-height:100vh;padding-bottom:48px;position:relative;overflow:hidden}
  canvas#sc{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}

  .blur-orb{position:absolute;border-radius:50%;pointer-events:none;z-index:0;filter:blur(60px)}
  .orb1{width:300px;height:300px;background:rgba(40,100,255,0.18);top:-80px;left:-80px}
  .orb2{width:260px;height:260px;background:rgba(100,40,255,0.15);top:300px;right:-100px}
  .orb3{width:200px;height:200px;background:rgba(30,150,255,0.12);bottom:100px;left:0}

  .z1{position:relative;z-index:1}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 22px 0}
  .app-title{font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(100,180,255,0.7)}
  .status-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.1);border-radius:20px;padding:5px 13px;font-size:11px;font-family:'Poppins',sans-serif;color:rgba(255,255,255,0.35);backdrop-filter:blur(8px)}
  .status-pill.on{background:rgba(60,180,255,0.1);border-color:rgba(60,180,255,0.35);color:#60c8ff}
  .sdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);flex-shrink:0}
  .sdot.on{background:#60c8ff;box-shadow:0 0 6px #60c8ff;animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

  .moon-section{display:flex;justify-content:center;align-items:center;padding:36px 0 28px;position:relative}
  .orbit-wrap{position:relative;width:260px;height:260px}
  .orbit-ring{position:absolute;border-radius:50%;border:0.5px solid rgba(80,160,255,0.12);top:50%;left:50%;transform:translate(-50%,-50%)}
  .or1{width:260px;height:260px}
  .or2{width:200px;height:200px}
  .or-dot{width:9px;height:9px;border-radius:50%;background:#60c8ff;box-shadow:0 0 12px #60c8ff,0 0 24px rgba(96,200,255,0.5);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none}

  .moon{width:160px;height:160px;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    background:radial-gradient(circle at 38% 32%,#1a3a6e,#0d2050 55%,#060f2e);
    border:1px solid rgba(80,160,255,0.2);
    display:flex;flex-direction:column;align-items:center;justify-content:center}
  .moon::before{content:'';position:absolute;inset:-2px;border-radius:50%;background:conic-gradient(from 0deg,transparent 40%,rgba(60,140,255,0.25) 60%,transparent 80%);animation:spin 10s linear infinite}
  .moon::after{content:'';position:absolute;inset:0;border-radius:50%;box-shadow:0 0 30px rgba(60,140,255,0.35),0 0 60px rgba(60,140,255,0.15),inset 0 0 30px rgba(60,140,255,0.1)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .moon-glow{position:absolute;inset:-30px;border-radius:50%;background:radial-gradient(circle,rgba(60,140,255,0.15) 0%,transparent 70%);pointer-events:none}

  .cd{font-size:38px;font-weight:300;color:#fff;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1;position:relative;z-index:2;text-shadow:0 0 20px rgba(100,180,255,0.8)}
  .cd.urgent{color:#ff8888;text-shadow:0 0 20px rgba(255,100,100,0.8)}
  .cd-sub{font-size:9px;letter-spacing:2.5px;color:rgba(120,180,255,0.5);text-transform:uppercase;margin-top:5px;position:relative;z-index:2}

  .pad{padding:0 18px;margin-bottom:14px}
  .glass{background:rgba(10,25,60,0.45);border:0.5px solid rgba(80,160,255,0.2);border-radius:18px;padding:18px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 0 0 0.5px rgba(80,160,255,0.08) inset,0 8px 32px rgba(0,0,40,0.3)}
  .glabel{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(100,170,255,0.5);font-weight:600;margin-bottom:14px}

  .interval-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}
  .int-btn{width:36px;height:36px;border-radius:50%;border:0.5px solid rgba(80,160,255,0.3);background:rgba(60,130,255,0.1);color:#80c0ff;font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-family:'Poppins',sans-serif}
  .int-btn:hover{background:rgba(60,130,255,0.25);box-shadow:0 0 10px rgba(60,130,255,0.3)}
  .int-btn:active{transform:scale(0.92)}
  .int-input{width:80px;text-align:center;font-size:36px;font-weight:300;color:#fff;background:transparent;border:none;outline:none;font-family:'Poppins',sans-serif;text-shadow:0 0 16px rgba(100,180,255,0.6);-moz-appearance:textfield}
  .int-input::-webkit-outer-spin-button,.int-input::-webkit-inner-spin-button{-webkit-appearance:none}
  .int-unit{font-size:13px;color:rgba(100,170,255,0.5);font-weight:400}

  input[type=range]{width:100%;-webkit-appearance:none;height:3px;border-radius:3px;outline:none;cursor:pointer;background:linear-gradient(to right,#3a8fff 0%,#3a8fff var(--pct,12.5%),rgba(255,255,255,0.1) var(--pct,12.5%),rgba(255,255,255,0.1) 100%)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #4a9fff;box-shadow:0 0 10px rgba(74,159,255,0.7),0 0 20px rgba(74,159,255,0.3);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #4a9fff;box-shadow:0 0 10px rgba(74,159,255,0.7);cursor:pointer}

  .presets{display:flex;gap:7px;margin-top:14px}
  .prs{flex:1;padding:7px 0;border-radius:20px;border:0.5px solid rgba(80,160,255,0.18);background:rgba(80,160,255,0.05);color:rgba(150,200,255,0.5);font-size:11px;font-family:'Poppins',sans-serif;font-weight:500;cursor:pointer;text-align:center;transition:all 0.15s}
  .prs.active{background:rgba(60,130,255,0.2);border-color:rgba(80,170,255,0.5);color:#90c8ff;box-shadow:0 0 10px rgba(60,130,255,0.2)}
  .prs:hover:not(.active){background:rgba(80,160,255,0.1)}

  .msg-in{width:100%;background:rgba(255,255,255,0.04);border:0.5px solid rgba(80,160,255,0.2);border-radius:11px;padding:11px 14px;color:#fff;font-size:13px;font-family:'Poppins',sans-serif;outline:none;transition:border 0.2s}
  .msg-in::placeholder{color:rgba(255,255,255,0.2)}
  .msg-in:focus{border-color:rgba(80,160,255,0.55);box-shadow:0 0 12px rgba(60,130,255,0.2)}

  .tgl-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
  .tgl-row+.tgl-row{border-top:0.5px solid rgba(80,160,255,0.08)}
  .tgl-l{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(180,215,255,0.75);font-weight:400}
  .tgl-ic{width:30px;height:30px;border-radius:9px;background:rgba(60,130,255,0.12);border:0.5px solid rgba(80,160,255,0.2);display:flex;align-items:center;justify-content:center;color:#7ab8ff;font-size:15px}
  .tgl{width:42px;height:24px;border-radius:12px;background:rgba(255,255,255,0.1);border:none;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0}
  .tgl.on{background:linear-gradient(135deg,#3a7fff,#5b4fff);box-shadow:0 0 12px rgba(60,130,255,0.4)}
  .tgl::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.3)}
  .tgl.on::after{transform:translateX(18px)}

  .launch{width:100%;padding:16px;border-radius:14px;border:none;font-size:14px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;letter-spacing:0.5px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s}
  .launch.go{background:linear-gradient(135deg,#2060ff,#5b4fff);color:#fff;box-shadow:0 0 24px rgba(60,130,255,0.45),0 0 48px rgba(60,130,255,0.15)}
  .launch.go:hover{box-shadow:0 0 32px rgba(60,130,255,0.6),0 0 64px rgba(60,130,255,0.2)}
  .launch.halt{background:rgba(255,70,70,0.1);border:0.5px solid rgba(255,100,100,0.3);color:#ff8888}
  .launch:active{transform:scale(0.98)}

  .notif-pop{background:linear-gradient(135deg,rgba(30,80,200,0.9),rgba(60,40,180,0.9));border:0.5px solid rgba(100,160,255,0.3);border-radius:16px;padding:14px 16px;margin:0 18px 16px;display:none;backdrop-filter:blur(16px);box-shadow:0 0 24px rgba(60,130,255,0.3)}
  .notif-pop.show{display:block;animation:popIn 0.3s ease}
  @keyframes popIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .np-title{font-size:14px;font-weight:500;color:#fff}
  .np-sub{font-size:11px;color:rgba(180,210,255,0.65);margin-top:3px}

  .log-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid rgba(80,160,255,0.08)}
  .log-item:last-child{border-bottom:none}
  .ldot{width:5px;height:5px;border-radius:50%;background:#4aafff;box-shadow:0 0 6px #4aafff;flex-shrink:0}
  .lmsg{font-size:12px;color:rgba(180,215,255,0.7);flex:1;font-weight:400}
  .ltime{font-size:10px;color:rgba(100,150,255,0.4)}

  /* PWA install banner */
  .install-banner{display:none;align-items:center;justify-content:space-between;margin:0 18px 14px;padding:12px 16px;background:rgba(60,130,255,0.12);border:0.5px solid rgba(80,160,255,0.3);border-radius:14px;gap:10px}
  .install-banner.show{display:flex}
  .ib-text{font-size:12px;color:rgba(180,215,255,0.8);flex:1;line-height:1.5}
  .ib-btn{padding:7px 14px;border-radius:10px;background:linear-gradient(135deg,#2060ff,#5b4fff);border:none;color:#fff;font-size:12px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;white-space:nowrap}
  .ib-close{background:none;border:none;color:rgba(180,215,255,0.4);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
</style>
</head>
<body>
<div class="wrap">
<canvas id="sc"></canvas>
<div class="orb1 blur-orb"></div>
<div class="orb2 blur-orb"></div>
<div class="orb3 blur-orb"></div>

<div class="topbar z1">
  <span class="app-title">Ed Reminder</span>
  <div class="status-pill" id="pill"><div class="sdot" id="sdot"></div><span id="stxt">Idle</span></div>
</div>

<div class="moon-section z1">
  <div class="orbit-wrap">
    <div class="orbit-ring or1"></div>
    <div class="orbit-ring or2"></div>
    <div class="or-dot" id="orDot"></div>
    <div class="moon-glow"></div>
    <div class="moon">
      <div class="cd" id="cd">--:--</div>
      <div class="cd-sub">next ping</div>
    </div>
  </div>
</div>

<div class="notif-pop" id="notifPop">
  <div class="np-title" id="npTitle">Reminder!</div>
  <div class="np-sub" id="npSub"></div>
</div>

<div class="install-banner z1" id="installBanner">
  <div class="ib-text">Install Ed Reminder ke Home Screen kamu!</div>
  <button class="ib-btn" id="installBtn">Install</button>
  <button class="ib-close" id="installClose">&#x2715;</button>
</div>

<div class="pad z1">
  <div class="glass">
    <div class="glabel">Interval</div>
    <div class="interval-row">
      <button class="int-btn" onclick="nudge(-1)">&#8722;</button>
      <input class="int-input" type="number" id="intInput" value="15" min="1" max="999">
      <span class="int-unit">min</span>
      <button class="int-btn" onclick="nudge(1)">+</button>
    </div>
    <input type="range" id="slider" min="1" max="120" value="15" step="1">
    <div class="presets">
      <button class="prs" onclick="setP(5)">5m</button>
      <button class="prs active" onclick="setP(15)">15m</button>
      <button class="prs" onclick="setP(30)">30m</button>
      <button class="prs" onclick="setP(60)">1h</button>
      <button class="prs" onclick="setP(90)">90m</button>
    </div>
  </div>
</div>

<div class="pad z1">
  <div class="glass">
    <div class="glabel">Message</div>
    <input class="msg-in" id="msgIn" type="text" value="Time to take a break" placeholder="Your reminder...">
  </div>
</div>

<div class="pad z1">
  <div class="glass">
    <div class="tgl-row">
      <div class="tgl-l">
        <div class="tgl-ic"><i class="ti ti-bell"></i></div>
        Browser notification
      </div>
      <button class="tgl" id="ntgl" onclick="toggleN()" aria-label="Toggle notification"></button>
    </div>
    <div class="tgl-row">
      <div class="tgl-l">
        <div class="tgl-ic"><i class="ti ti-device-mobile-vibration"></i></div>
        Vibrate &amp; sound
      </div>
      <button class="tgl on" id="vtgl" onclick="toggleV()" aria-label="Toggle vibrate"></button>
    </div>
  </div>
</div>

<div class="pad z1">
  <button class="launch go" id="mainBtn" onclick="toggle()">
    <i class="ti ti-rocket"></i> Launch
  </button>
</div>

<div class="pad z1" id="logWrap" style="display:none">
  <div class="glass">
    <div class="glabel">Log</div>
    <div id="logList"></div>
  </div>
</div>
</div>

<script>
// ── Stars canvas ──
const sc = document.getElementById('sc');
function resizeCanvas() { sc.width = window.innerWidth; sc.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
const ctx = sc.getContext('2d');
const stars = [];
for (let i = 0; i < 220; i++) {
  stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.4 + 0.2,
    a: Math.random() * 0.8 + 0.15, da: (Math.random() - 0.5) * 0.012,
    col: Math.random() < 0.4 ? '#b0d8ff' : '#ffffff' });
}
function drawStars() {
  const W = sc.width, H = sc.height;
  ctx.clearRect(0, 0, W, H);
  stars.forEach(s => {
    s.a += s.da;
    if (s.a > 0.95 || s.a < 0.1) s.da *= -1;
    ctx.save();
    ctx.globalAlpha = Math.max(0.05, s.a);
    ctx.fillStyle = s.col;
    if (s.r > 1) { ctx.shadowColor = '#80c8ff'; ctx.shadowBlur = s.r * 5; }
    ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// ── App state ──
let running = false, total = 0, remain = 0, tickId = null;
let notifOn = false, vibOn = true, logs = [], angle = 0, raf = null;

const slider    = document.getElementById('slider');
const intInput  = document.getElementById('intInput');
const cd        = document.getElementById('cd');
const pill      = document.getElementById('pill');
const sdot      = document.getElementById('sdot');
const stxt      = document.getElementById('stxt');
const orDot     = document.getElementById('orDot');

function fmt(s) { return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0'); }
function getVal() { return Math.max(1, Math.min(999, parseInt(intInput.value) || 15)); }

function syncSlider(v) {
  const clamped = Math.min(120, v);
  slider.value = clamped;
  const pct = ((clamped - 1) / 119 * 100).toFixed(1) + '%';
  slider.style.setProperty('--pct', pct);
}
function hlPreset(v) {
  document.querySelectorAll('.prs').forEach(b => b.classList.remove('active'));
  [{v:5,i:0},{v:15,i:1},{v:30,i:2},{v:60,i:3},{v:90,i:4}].forEach(p => {
    if (p.v === v) document.querySelectorAll('.prs')[p.i].classList.add('active');
  });
}
function setP(v) { intInput.value = v; syncSlider(v); hlPreset(v); if (!running) cd.textContent = fmt(v * 60); }
function nudge(d) { const v = Math.max(1, getVal() + d); intInput.value = v; syncSlider(v); hlPreset(v); if (!running) cd.textContent = fmt(v * 60); }

intInput.addEventListener('input', () => { const v = getVal(); syncSlider(v); hlPreset(v); if (!running) cd.textContent = fmt(v * 60); });
slider.addEventListener('input', () => {
  const v = parseInt(slider.value);
  intInput.value = v; hlPreset(v);
  const pct = ((v - 1) / 119 * 100).toFixed(1) + '%';
  slider.style.setProperty('--pct', pct);
  if (!running) cd.textContent = fmt(v * 60);
});

function toggleN() {
  if (!notifOn) {
    if ('Notification' in window) {
      Notification.requestPermission().then(p => {
        notifOn = p === 'granted';
        document.getElementById('ntgl').classList.toggle('on', notifOn);
      });
    }
  } else { notifOn = false; document.getElementById('ntgl').classList.remove('on'); }
}
function toggleV() { vibOn = !vibOn; document.getElementById('vtgl').classList.toggle('on', vibOn); }

function toggle() { running ? stop() : start(); }

function start() {
  total = getVal() * 60; remain = total; running = true;
  slider.disabled = true; intInput.disabled = true;
  document.querySelectorAll('.prs').forEach(b => b.disabled = true);
  document.getElementById('mainBtn').className = 'launch halt';
  document.getElementById('mainBtn').innerHTML = '<i class="ti ti-player-stop"></i> Stop';
  pill.className = 'status-pill on'; sdot.className = 'sdot on'; stxt.textContent = 'Active';
  orDot.style.display = 'block';
  tickFn(); tickId = setInterval(tickFn, 1000); animDot();
}
function stop() {
  clearInterval(tickId); cancelAnimationFrame(raf); running = false;
  slider.disabled = false; intInput.disabled = false;
  document.querySelectorAll('.prs').forEach(b => b.disabled = false);
  document.getElementById('mainBtn').className = 'launch go';
  document.getElementById('mainBtn').innerHTML = '<i class="ti ti-rocket"></i> Launch';
  pill.className = 'status-pill'; sdot.className = 'sdot'; stxt.textContent = 'Idle';
  orDot.style.display = 'none';
  cd.textContent = '--:--'; cd.className = 'cd';
}
function tickFn() {
  if (remain <= 0) { fire(); remain = total; }
  cd.textContent = fmt(remain);
  cd.className = 'cd' + (remain <= 30 ? ' urgent' : '');
  remain--;
}
function animDot() {
  angle += 0.015;
  const r = 130, cx = 130, cy = 130;
  const x = cx + Math.cos(angle) * r;
  const y = cy + Math.sin(angle) * r * 0.38;
  orDot.style.left = x + 'px'; orDot.style.top = y + 'px';
  orDot.style.transform = 'translate(-50%,-50%)';
  raf = requestAnimationFrame(animDot);
}
function fire() {
  const msg = document.getElementById('msgIn').value || 'Time!';
  const t = new Date().toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
  const pop = document.getElementById('notifPop');
  document.getElementById('npTitle').textContent = msg;
  document.getElementById('npSub').textContent = 'Sent at ' + t;
  pop.className = 'notif-pop show'; setTimeout(() => pop.className = 'notif-pop', 4500);
  if (vibOn && navigator.vibrate) navigator.vibrate([150, 80, 150, 80, 300]);
  if (notifOn && Notification.permission === 'granted') new Notification('Ed Reminder', { body: msg });
  beep(); addLog(msg, t);
}
function addLog(msg, t) {
  logs.unshift({ msg, t }); if (logs.length > 6) logs.pop();
  document.getElementById('logWrap').style.display = 'block';
  document.getElementById('logList').innerHTML = logs.map(l =>
    `<div class="log-item"><div class="ldot"></div><div class="lmsg">${l.msg}</div><div class="ltime">${l.t}</div></div>`
  ).join('');
}
function beep() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach(d => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value = 660; o.type = 'sine';
      g.gain.setValueAtTime(0.22, ac.currentTime + d);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + d + 0.18);
      o.start(ac.currentTime + d); o.stop(ac.currentTime + d + 0.18);
    });
  } catch(e) {}
}

// ── PWA Install prompt ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
});
document.getElementById('installClose').addEventListener('click', () => {
  document.getElementById('installBanner').classList.remove('show');
});

// Init
syncSlider(15); hlPreset(15);
cd.textContent = fmt(15 * 60);
</script>
</body>
</html>
